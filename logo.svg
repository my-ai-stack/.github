<svg fill="none" viewBox="0 0 800 300" width="800" height="300" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .canvas {
          background: #000;
          font-family: -apple-system, system-ui, sans-serif;
          height: 300px;
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          color: white;
          overflow: hidden;
          position: relative;
        }
        .grid {
          position: absolute;
          width: 200%; height: 200%;
          background-image: linear-gradient(#111 1px, transparent 1px), linear-gradient(90deg, #111 1px, transparent 1px);
          background-size: 40px 40px;
          transform: perspective(500px) rotateX(60deg);
          top: -50%;
          z-index: 0;
          opacity: 0.5;
        }
        .glow {
          position: absolute;
          width: 300px; height: 300px;
          background: radial-gradient(circle, rgba(219, 39, 119, 0.15) 0%, transparent 70%);
          z-index: 1;
        }
        .stack-wrap {
          z-index: 2;
          display: flex;
          flex-direction: column;
          align-items: center;
          animation: float 6s ease-in-out infinite;
        }
        h1 {
          font-size: 72px;
          font-weight: 900;
          letter-spacing: -4px;
          margin: 0;
          background: linear-gradient(to bottom, #fff 40%, #666);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
        }
        .scanning-line {
          width: 400px;
          height: 1px;
          background: linear-gradient(90deg, transparent, #db2777, transparent);
          box-shadow: 0 0 20px #db2777;
          position: absolute;
          animation: scan 3s linear infinite;
        }
        @keyframes scan { 0% { top: 20%; opacity: 0; } 50% { opacity: 1; } 100% { top: 80%; opacity: 0; } }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }
      </style>
      <div class="canvas">
        <div class="grid"></div>
        <div class="glow"></div>
        <div class="scanning-line"></div>
        <div class="stack-wrap">
          <h1>STACK AI</h1>
          <div style="letter-spacing: 12px; font-size: 10px; color: #db2777; font-weight: bold; margin-top: -10px;">GLOBAL SOVEREIGNTY</div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
